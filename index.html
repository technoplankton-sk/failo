<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Авто-Чат и Файлообменник</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #1e1e24; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .auth-box { background: #222; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        input, button { padding: 10px; margin: 10px 0; border: none; border-radius: 4px; font-size: 16px; }
        input[type="password"] { background: #333; color: #fff; width: 250px; text-align: center; }
        button { background: #28a745; color: #fff; cursor: pointer; width: 100%; }
        button:hover { background: #218838; }
        .error-msg { color: #dc3545; font-size: 14px; display: none; }

        #user-select { display: none; gap: 15px; margin-top: 15px; }
        .user-btn { background: #007bff; padding: 12px; font-size: 18px; font-weight: bold; }
        .user-btn:hover { background: #0056b3; }

        #main-container { display: none; width: 90%; max-width: 900px; height: 85vh; background: #2a2a32; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .grid { display: flex; height: 100%; }
        .sidebar { width: 30%; background: #202026; padding: 20px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid #3a3a45; }
        .chat-area { width: 70%; display: flex; flex-direction: column; background: #25252d; }
        
        .status-box { background: #2a2a32; padding: 10px; border-radius: 6px; font-size: 14px; color: #aaa; }
        .messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 8px; max-width: 70%; word-break: break-all; }
        .msg.system { background: #3a3a45; align-self: center; font-size: 12px; color: #aaa; }
        .msg.me { background: #007bff; align-self: flex-end; }
        .msg.peer { background: #444; align-self: flex-start; }
        
        .input-panel { padding: 15px; background: #1e1e24; display: flex; gap: 10px; align-items: center; }
        .input-panel input[type="text"] { flex-grow: 1; background: #333; color: #fff; padding: 10px; border: none; border-radius: 4px; }
        .input-panel button { width: auto; margin: 0; }
        
        .file-label { background: #6c757d; padding: 10px; border-radius: 4px; cursor: pointer; text-align: center; font-size: 14px; }
        .file-label:hover { background: #5a6268; }
        #file-input { display: none; }
        .download-link { color: #00cbc6; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box" id="pass-stage">
            <h3>Доступ ограничен</h3>
            <input type="password" id="pass-input" placeholder="Введите пароль" onkeypress="if(event.key === 'Enter') checkPassword()">
            <button onclick="checkPassword()">Войти</button>
            <p class="error-msg" id="auth-error">Неверный пароль!</p>
        </div>
        
        <div class="auth-box" id="user-stage" style="display: none;">
            <h3>Кто вы?</h3>
            <div id="user-select">
                <button class="user-btn" onclick="selectUser('dima')">Дима</button>
                <button class="user-btn" onclick="selectUser('valera')" style="background:#17a2b8;">Валера</button>
            </div>
        </div>
    </div>

    <div id="main-container">
        <div class="grid">
            <div class="sidebar">
                <h3>Вы зашли как:</h3>
                <div class="status-box"><strong id="username-display">...</strong></div>
                <hr style="border-color: #3a3a45;">
                <h3>Статус сети:</h3>
                <div class="status-box" id="network-status">Поиск собеседника в базе...</div>
                <hr style="border-color: #3a3a45;">
                <label class="file-label" id="file-selector-label" style="display:none;">
                    📁 Выбрать файл для отправки
                    <input type="file" id="file-input" onchange="sendFile()">
                </label>
            </div>
            
            <div class="chat-area">
                <div class="messages" id="chat-messages">
                    <div class="msg system">Система готова к работе.</div>
                </div>
                <div class="input-panel">
                    <input type="text" id="msg-input" placeholder="Напишите сообщение..." disabled onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button id="send-btn" onclick="sendMessage()" disabled>Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const HASHED_PASSWORD = "7e5ae8620fc5ac135465b24fdba97f058fe5c752aa99328d4f97d156ff6fdf9e"; // Пароль "4354"

        const firebaseConfig = {
            apiKey: "AIzaSyBqwZxOIWjPvNfajuxGCK6wNt4G0NYvlRY",
            authDomain: "failo-a5451.firebaseapp.com",
            projectId: "failo-a5451",
            storageBucket: "failo-a5451.firebasestorage.app",
            messagingSenderId: "837963381464",
            appId: "1:837963381464:web:735ef5077cc1c022a935ad",
            databaseURL: "https://failo-a5451-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let peer = null;
        let conn = null;
        let myRole = '';    
        let peerRole = '';  

        // Переменные для сборки файлов из чанков
        let receivedChunks = [];
        let incomingFileMeta = null;
        const CHUNK_SIZE = 16384; // 16 KB куски для стабильности WebRTC

        async function sha256(string) {
            const utf8 = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkPassword() {
            const input = document.getElementById('pass-input').value;
            const hashedInput = await sha256(input);

            if (hashedInput === HASHED_PASSWORD) {
                document.getElementById('pass-stage').style.display = 'none';
                document.getElementById('user-stage').style.display = 'block';
                document.getElementById('user-select').style.display = 'flex';
            } else {
                document.getElementById('auth-error').style.display = 'block';
            }
        }

        function selectUser(role) {
            myRole = role;
            peerRole = (role === 'dima') ? 'valera' : 'dima';
            
            document.getElementById('username-display').innerText = role === 'dima' ? 'Дима' : 'Валера';
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            
            initPeerAndSync();
        }

        function initPeerAndSync() {
            peer = new Peer();

            peer.on('open', (id) => {
                document.getElementById('network-status').innerText = 'Синхронизация с базой...';
                
                db.ref('online/' + myRole).set({
                    id: id,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                db.ref('online/' + myRole).onDisconnect().remove();
                listenForPeer();
            });

            peer.on('connection', (incomingConn) => {
                if (conn) return;
                conn = incomingConn;
                setupConnectionHandlers();
            });
        }

        function listenForPeer() {
            db.ref('online/' + peerRole).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.id && !conn) {
                    document.getElementById('network-status').innerText = 'Друг в сети. Соединение...';
                    conn = peer.connect(data.id);
                    setupConnectionHandlers();
                } else if (!data) {
                    document.getElementById('network-status').innerText = 'Ожидаем подключение друга...';
                }
            });
        }

        function setupConnectionHandlers() {
            conn.on('open', () => {
                document.getElementById('network-status').innerText = 'Связаны напрямую (P2P)!';
                document.getElementById('msg-input').disabled = false;
                document.getElementById('send-btn').disabled = false;
                document.getElementById('file-selector-label').style.display = 'block';
            });

            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    logMessage('Друг', data.text, 'peer');
                } else if (data.type === 'file-start') {
                    // Инициализация приема нового файла
                    receivedChunks = [];
                    incomingFileMeta = data;
                    logMessage('Система', `Принимаем файл "${data.fileName}"...`);
                } else if (data.type === 'file-chunk') {
                    // Собираем куски в массив
                    receivedChunks.push(data.chunkData);
                } else if (data.type === 'file-end') {
                    // Склеиваем файл обратно и выводим ссылку на скачивание
                    const blob = new Blob(receivedChunks, { type: incomingFileMeta.fileType });
                    const url = URL.createObjectURL(blob);
                    const linkHtml = `<span class="download-link" onclick="downloadFile('${url}', '${incomingFileMeta.fileName}')">Скачать ${incomingFileMeta.fileName} (${(incomingFileMeta.fileSize/1024/1024).toFixed(2)} MB)</span>`;
                    logMessage('Друг', `Прислал файл: ${linkHtml}`, 'peer');
                    
                    // Сброс буфера приемника
                    receivedChunks = [];
                    incomingFileMeta = null;
                }
            });

            conn.on('close', () => {
                logMessage('Система', 'Собеседник отключился.');
                resetInterface();
            });
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !conn) return;

            conn.send({ type: 'chat', text: text });
            logMessage('Вы', text, 'me');
            input.value = '';
        }

        // Потоковая отправка файлов чанками (кусочками)
        function sendFile() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (!file || !conn) return;

            logMessage('Система', `Отправка файла "${file.name}"... Ожидайте окончания загрузки.`);

            const reader = new FileReader();
            reader.onload = function(event) {
                const buffer = event.target.result;
                let offset = 0;

                // Отправляем сигнал о старте файла с метаданными
                conn.send({
                    type: 'file-start',
                    fileName: file.name,
                    fileType: file.type,
                    fileSize: file.size
                });

                // Функция последовательной нарезки и отправки
                function sendNextChunk() {
                    if (offset < buffer.byteLength) {
                        const chunk = buffer.slice(offset, offset + CHUNK_SIZE);
                        offset += CHUNK_SIZE;
                        
                        conn.send({
                            type: 'file-chunk',
                            chunkData: chunk
                        });
                        
                        // Микротаймаут в 1мс, чтобы не перегружать сетевой стек браузера
                        setTimeout(sendNextChunk, 1);
                    } else {
                        // Файл отправлен полностью
                        conn.send({ type: 'file-end' });
                        logMessage('Вы', `Успешно отправлен файл: ${file.name}`, 'me');
                        fileInput.value = '';
                    }
                }
                sendNextChunk();
            };
            reader.readAsArrayBuffer(file);
        }

        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
        }

        function logMessage(sender, text, type = 'system') {
            const chat = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            msgDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        function resetInterface() {
            conn = null;
            document.getElementById('msg-input').disabled = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('file-selector-label').style.display = 'none';
            document.getElementById('network-status').innerText = 'Соединение разорвано. Ожидание...';
        }
    </script>
</body>
</html>
